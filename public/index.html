<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureChat - Private</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #111b21; color: #e9edef; margin: 0; padding: 0; display: flex; justify-content: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 900px; background-color: #00a884; display: flex; height: 100%; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .sidebar { width: 35%; background-color: #111b21; border-right: 1px solid #222d34; padding: 20px; }
        .chat-area { width: 65%; background-color: #0b141a; display: flex; flex-direction: column; }
        .header { background-color: #202c33; padding: 15px; display: flex; align-items: center; font-size: 18px; font-weight: bold; border-bottom: 1px solid #222d34; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 65%; padding: 10px 15px; border-radius: 8px; position: relative; background-color: #005c4b; }
        .message.me { align-self: flex-end; background-color: #005c4b; }
        .message.other { align-self: flex-start; background-color: #202c33; }
        .sender { font-size: 12px; color: #00a884; margin-bottom: 4px; }
        .text { word-wrap: break-word; }
        .time { font-size: 11px; color: #8696a0; text-align: right; margin-top: 5px; }
        .input-area { background-color: #202c33; padding: 15px; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 8px; border: none; background-color: #2a3942; color: white; font-size: 15px; outline: none; }
        button { padding: 12px 20px; background-color: #00a884; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #017561; }
        button:disabled { background-color: #3b4a54; cursor: not-allowed; }
        .login-box { margin-top: 20px; }
        .login-box input { width: 90%; margin-bottom: 10px; }
        .system-msg { text-align: center; color: #8696a0; font-size: 13px; font-style: italic; margin: 10px 0; }
    </style>
</head>
<body>

<div class="chat-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="header">SecureChat</div>
        <div class="login-box">
            <input type="text" id="username" placeholder="Ingiza Jina Lako..." autocomplete="off">
            <button onclick="joinChat()">Jiunge Chat</button>
        </div>
        <div style="margin-top: 30px; color: #8696a0; font-size: 14px;">
            <p><strong>Watumiaji Wanaweza:</strong></p>
            <ul>
                <li>Kutuma ujumbe wa moja kwa moja</li>
                <li>Kuona anayepiga chapa</li>
                <li>(Voice/Video itajengwa baadaye)</li>
            </ul>
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
        <div class="header">Chat ya Kibinafsi (End-to-End)</div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Andika ujumbe..." disabled>
            <button id="sendBtn" onclick="sendMessage()" disabled>Tuma</button>
        </div>
    </div>
</div>

<!-- Tunatumia Socket.io kutoka CDN -->
<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myUsername = "";

    // Kujunga chatini
    function joinChat() {
        const nameInput = document.getElementById('username');
        const name = nameInput.value.trim();
        if (name !== "") {
            myUsername = name;
            socket.emit('join_chat', myUsername);
            nameInput.disabled = true;
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.querySelector('.login-box button').disabled = true;
        }
    }

    // Kutuma ujumbe
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const msg = input.value.trim();
        if (msg !== "") {
            socket.emit('send_message', { sender: myUsername, message: msg });
            input.value = '';
        }
    }

    // Kupokea ujumbe
    socket.on('receive_message', (data) => {
        const msgDiv = document.createElement('div');
        const isMe = data.sender === myUsername ? 'me' : 'other';
        
        msgDiv.innerHTML = `
            <div class="message ${isMe}">
                <div class="sender">${data.sender}</div>
                <div class="text">${data.message}</div>
                <div class="time">${data.time}</div>
            </div>
        `;
        document.getElementById('messages').appendChild(msgDiv);
        // Kuscrolla chini automatiki
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    });

    // Mtumiaji amejiunga
    socket.on('user_joined', (msg) => {
        addSystemMessage(msg);
    });

    // Mtumiaji ametoka
    socket.on('user_left', (msg) => {
        addSystemMessage(msg);
    });

    function addSystemMessage(msg) {
        const sysDiv = document.createElement('div');
        sysDiv.className = 'system-msg';
        sysDiv.innerText = msg;
        document.getElementById('messages').appendChild(sysDiv);
    }

    // Kuruhusu kutuma kwa kutumia Enter
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });
</script>

</body>
</html>
